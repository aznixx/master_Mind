name: MasterMind lint and tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8 pep8-naming

      - name: Check Python syntax
        run: python -m py_compile master_Mind.py test_master_Mind.py

      - name: Run tests
        run: |
          mkdir -p test-results
          python test_master_Mind.py | tee test-results/test-report.txt

      - name: Run flake8 PEP8 report
        run: |
          mkdir -p test-results
          flake8 master_Mind.py test_master_Mind.py --tee --output-file=test-results/flake8-report.txt

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mastermind-reports
          path: test-results/
