name: MasterMind tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check Python syntax
        run: python -m py_compile master_Mind.py

      - name: Run tests
        run: |
          mkdir -p test-results
          python master_Mind.py --test | tee test-results/test-report.txt

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: mastermind-test-report
          path: test-results/test-report.txt
